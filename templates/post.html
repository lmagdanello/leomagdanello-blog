{{ define "post.html" }}
<article class="post">
    <header class="post-header">
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
            <span>{{ formatDatePT .Date }}</span>            
            <span>@{{ .Author }}</span>
        </div>
    </header>

    <div class="post-content">
        {{ .HTML | safeHTML }}
    </div>

    <footer class="post-footer">
        <a href="/" class="read-more">← Voltar</a>
    </footer>
</article>
{{ end }}
