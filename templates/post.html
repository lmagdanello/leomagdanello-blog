{{ define "post.html" }}
<article class="post">
    <header class="post-header">
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
            <span>{{ .Date.Format "January 2, 2006" }}</span>
            <span>por {{ .Author }}</span>
        </div>
    </header>

    <div class="post-content">
        {{ .HTML | safeHTML }}
    </div>

    <footer class="post-footer">
        <a href="/" class="read-more">← Voltar para todos os posts</a>
    </footer>
</article>
{{ end }}
