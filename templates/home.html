{{ define "home.html" }}
<header class="page-header">
    <h1>Últimos Posts</h1>
</header>

<div class="posts">
    {{ range . }}
    <article class="post-summary">
        <h2><a href="/post/{{ .Filename }}">{{ .Title }}</a></h2>
        <div class="post-meta">
            <span>{{ .Date.Format "January 2, 2006" }}</span>
            <span>por {{ .Author }}</span>
        </div>
        <div class="post-excerpt">
            {{ truncate 200 .HTML | safeHTML }}
        </div>
        <a href="/post/{{ .Filename }}" class="read-more">Continuar lendo →</a>
    </article>
    {{ end }}
</div>
{{ end }}
